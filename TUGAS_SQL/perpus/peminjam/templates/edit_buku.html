{% extends 'base.html' %}

{% block title %}
Edit Buku - {{ buku.judul }}
{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold text-slate-800">
            Edit Data Buku
        </h1>
        <a href="{% url 'daftar_buku' %}"
           class="bg-slate-600 hover:bg-slate-700 text-white px-5 py-3 rounded-xl transition duration-200">
            Batal
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-md border border-slate-100 p-6">
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Judul Buku</label>
                <input type="text" name="judul" value="{{ buku.judul }}" required
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Pengarang</label>
                <input type="text" name="pengarang" value="{{ buku.pengarang }}" required
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Kategori</label>
                    <input type="text" name="kategori" value="{{ buku.kategori }}" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Penerbit</label>
                    <input type="text" name="penerbit" value="{{ buku.penerbit|default:'' }}"
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Rak</label>
                    <input type="text" name="rak" value="{{ buku.rak }}" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Tahun Terbit</label>
                    <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit|default:'' }}"
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Stok</label>
                    <input type="number" name="stok" value="{{ buku.stok }}" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Deskripsi / Sinopsis</label>
                <textarea name="deskripsi" rows="4"
                          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 transition">{{ buku.deskripsi|default:'' }}</textarea>
            </div>

            <div class="pt-3 flex justify-end">
                <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium transition duration-150">
                    Simpan Perubahan
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
