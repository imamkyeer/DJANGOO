{% extends 'base.html' %}

{% block title %}
Edit User
{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'user_list' %}" class="text-gray-400 hover:text-gray-600 text-sm flex items-center gap-1 mb-1">
        ← Kelola User
    </a>
    <h1 class="text-3xl font-bold text-gray-800">
        Edit User
    </h1>
</div>

<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-4xl">
    <form method="POST">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="text-xs font-semibold text-gray-500 block mb-2">Nama</label>
                <input type="text" name="nama" value="{{ user.nama }}" class="w-full bg-gray-50/50 border border-gray-200 rounded-xl px-4 py-3 text-gray-700 focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 block mb-2">Kelas</label>
                <input type="text" name="kelas" value="{{ user.kelas }}" class="w-full bg-gray-50/50 border border-gray-200 rounded-xl px-4 py-3 text-gray-700 focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 block mb-2">NIS</label>
                <input type="text" name="nis" value="{{ user.nis }}" class="w-full bg-gray-50/50 border border-gray-200 rounded-xl px-4 py-3 text-gray-700 focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 block mb-2">Status</label>
                <select name="status" class="w-full bg-gray-50/50 border border-gray-200 rounded-xl px-4 py-3 text-gray-700 focus:outline-none focus:border-blue-500 transition-colors appearance-none">
                    <option value="Aktif" {% if user.status == 'Aktif' %}selected{% endif %}>Aktif</option>
                    <option value="Nonaktif" {% if user.status == 'Nonaktif' %}selected{% endif %}>Nonaktif</option>
                </select>
            </div>
        </div>

        <div class="flex justify-end gap-3 border-t border-gray-100 pt-4">
            <a href="{% url 'user_list' %}" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-6 py-3 rounded-xl font-medium transition-colors text-sm">
                Batal
            </a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium transition-colors text-sm">
                Simpan Perubahan
            </button>
        </div>
    </form>
</div>
{% endblock %}
