{% extends 'base.html' %}

{% block title %}
Hapus User
{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'user_list' %}" class="text-gray-400 hover:text-gray-600 text-sm flex items-center gap-1 mb-1">
        ← Kelola User
    </a>
    <h1 class="text-3xl font-bold text-gray-800">
        Hapus User
    </h1>
</div>

<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-2xl">
    <div class="mb-6">
        <p class="text-sm text-gray-500 mb-1">Anda akan menghapus:</p>
        <h3 class="text-xl font-bold text-gray-800 mb-2">{{ user.nama }}</h3>
        <p class="text-xs text-gray-400">
            Data user akan dihapus dari daftar anggota perpustakaan.
        </p>
    </div>

    <form method="POST" class="flex justify-end gap-3 border-t border-gray-100 pt-4">
        {% csrf_token %}
        <a href="{% url 'user_list' %}" class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-600 px-6 py-3 rounded-xl font-medium transition-colors">
            Batal
        </a>
        <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white px-6 py-3 rounded-xl font-medium transition-colors">
            Hapus
        </button>
    </form>
</div>
{% endblock %}
