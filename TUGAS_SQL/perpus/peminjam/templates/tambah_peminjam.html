{% extends 'base.html' %}

{% block title %} Pinjam Buku {% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto mt-6">
    <h2 class="text-3xl font-bold mb-6 text-gray-800">
        Tambah Peminjaman Buku
    </h2>

    <form method="POST" class="bg-white p-8 rounded-2xl shadow-md">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-5">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">
                    Nama Peminjam
                </label>
                <select name="siswa_id" required class="w-full border rounded-xl px-4 py-3">
                    <option value="">-- Pilih Siswa --</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">
                        {{ user.nama }} - {{ user.kelas }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">
                    Pilih Buku
                </label>
                <select id="bukuSelect" name="buku_id" required class="w-full border rounded-xl px-4 py-3">
                    <option value="" data-stok="0">-- Pilih Buku --</option>
                    {% for buku in buku_list %}
                    <option value="{{ buku.id }}" data-stok="{{ buku.stok }}">
                        {{ buku.judul }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">
                    Jumlah Pinjam 
                    <span id="labelStok" class="text-xs font-normal text-gray-400 hidden">
                        (Sisa Stok: <span id="infoStok">0</span>)
                    </span>
                </label>
                <input 
                    type="number" 
                    id="jumlahPinjam"
                    name="jumlah_pinjam" 
                    value="1" 
                    min="1"
                    disabled
                    required 
                    class="w-full border bg-gray-100 rounded-xl px-4 py-3 focus:outline-none transition-all">
                <p id="errorJumlah" class="text-rose-500 text-xs mt-1 hidden font-medium">
                    ⚠️ Jumlah melebihi stok buku!
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">
                    Keperluan
                </label>
                <select name="keperluan" required class="w-full border rounded-xl px-4 py-3">
                    <option value="Baca di tempat">Baca di tempat</option>
                    <option value="Bawa pulang">Bawa pulang</option>
                    <option value="Referensi">Referensi</option>
                </select>
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">
                    Petugas
                </label>
                <input 
                    type="text"
                    name="petugas"
                    value="{{ petugas_aktif }}"
                    readonly
                    class="w-full bg-gray-100 border rounded-xl px-4 py-3">
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">
                Catatan
            </label>
            <textarea
                name="catatan"
                rows="4"
                placeholder="Contoh: untuk tugas Bahasa Indonesia"
                class="w-full border rounded-xl px-4 py-3"></textarea>
        </div>

        <div class="flex justify-end gap-3">
            <a href="{% url 'daftar_peminjaman' %}" class="bg-gray-500 text-white px-5 py-3 rounded-xl hover:bg-gray-600 transition">
                Batal
            </a>
            <button type="submit" id="submitBtn" class="bg-blue-600 text-white px-5 py-3 rounded-xl hover:bg-blue-700 transition">
                Simpan Peminjaman
            </button>
        </div>
    </form>
</div>

<script>
    const bukuSelect = document.getElementById('bukuSelect');
    const jumlahPinjam = document.getElementById('jumlahPinjam');
    const labelStok = document.getElementById('labelStok');
    const infoStok = document.getElementById('infoStok');
    const errorJumlah = document.getElementById('errorJumlah');
    const submitBtn = document.getElementById('submitBtn');

    function validasiForm() {
        const optionTerpilih = bukuSelect.options[bukuSelect.selectedIndex];
        const stok = parseInt(optionTerpilih.getAttribute('data-stok')) || 0;
        const jumlah = parseInt(jumlahPinjam.value) || 0;

        if (!bukuSelect.value) {
            labelStok.classList.add('hidden');
            jumlahPinjam.disabled = true;
            jumlahPinjam.classList.add('bg-gray-100');
            submitBtn.disabled = true;
            return;
        }

        labelStok.classList.remove('hidden');
        infoStok.textContent = stok;
        jumlahPinjam.disabled = false;
        jumlahPinjam.classList.remove('bg-gray-100');
        jumlahPinjam.max = stok;

        if (jumlah > stok || jumlah < 1) {
            errorJumlah.classList.remove('hidden');
            submitBtn.disabled = true;
        } else {
            errorJumlah.classList.add('hidden');
            submitBtn.disabled = false;
        }
    }

    bukuSelect.addEventListener('change', function() {
        jumlahPinjam.value = 1;
        validasiForm();
    });
    jumlahPinjam.addEventListener('input', validasiForm);
</script>
{% endblock %}
