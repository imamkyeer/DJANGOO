<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah User - Sistem Peminjaman Buku SIPUSTAKA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a",
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-900 h-screen overflow-hidden">
    <div class="h-screen flex flex-col md:flex-row">
      <aside
        class="w-full md:w-72 h-screen bg-slate-950 text-slate-100 flex-none flex flex-col"
      >
        <div class="px-6 py-7 border-b border-slate-800">
          <div class="flex items-center gap-3">
            <div
              class="w-11 h-11 rounded-2xl bg-gradient-to-br from-brand-500 to-sky-400 flex items-center justify-center shadow-lg shadow-slate-900/25"
            >
              <span class="text-xl font-bold">P</span>
            </div>
            <div>
              <p class="text-sm uppercase text-slate-400 tracking-[0.25em]">
                SIPUSTAKA
              </p>
              <h1 class="text-xl font-semibold">Sistem Peminjaman Buku</h1>
            </div>
          </div>
        </div>
        <nav class="flex-1 overflow-y-auto px-4 py-6 space-y-1">
          <a
            href="index.html"
            class="page-link w-full text-left rounded-2xl px-4 py-3 flex items-center gap-3 text-slate-300 hover:text-white hover:bg-slate-900 transition"
          >
            <span class="material-icons-outlined">dashboard</span>
            DASHBOARD
          </a>
          <a
            href="users.html"
            class="page-link w-full text-left rounded-2xl px-4 py-3 flex items-center gap-3 text-slate-200 bg-slate-900 shadow-inner shadow-black/10"
          >
            <span class="material-icons-outlined"></span>
            User
          </a>
        </nav>
        <div class="mt-auto px-6 pb-6">
          <div
            class="rounded-3xl bg-slate-900 p-5 shadow-xl shadow-slate-900/20"
          >
            <p class="text-sm text-slate-400">Admin Aktif</p>
            <p class="mt-2 font-semibold text-white">Budi Siregar</p>
          </div>
        </div>
      </aside>
      <main class="flex-1 overflow-y-auto p-6 md:p-8">
        <div class="flex items-center gap-3 mb-6">
          <a
            href="users.html"
            class="text-slate-500 hover:text-slate-700 transition"
          >
            <span class="material-icons-outlined">arrow_back</span>
          </a>
          <div>
            <p class="text-slate-500">Kelola data user perpustakaan.</p>
            <h3 class="text-2xl font-semibold text-slate-900">Tambah User</h3>
          </div>
        </div>
        <div
          class="rounded-3xl bg-white p-6 shadow-lg shadow-slate-200/60 border border-slate-200 max-w-4xl"
        >
          <form id="form-add-user" class="space-y-4">
            <div class="grid gap-4 sm:grid-cols-2">
              <label class="block">
                <span class="text-sm font-medium text-slate-700">Nama</span>
                <input
                  name="nama"
                  type="text"
                  class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
                  required
                />
              </label>
              <label class="block">
                <span class="text-sm font-medium text-slate-700">Kelas</span>
                <input
                  name="kelas"
                  type="text"
                  class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
                  placeholder="Contoh: XI IPA 1"
                  required
                />
              </label>
            </div>
            <div class="grid gap-4 sm:grid-cols-2">
              <label class="block">
                <span class="text-sm font-medium text-slate-700">NIS</span>
                <input
                  name="nis"
                  type="text"
                  inputmode="numeric"
                  class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
                  placeholder="Contoh: 2026005"
                  required
                />
              </label>
              <label class="block">
                <span class="text-sm font-medium text-slate-700">Status</span>
                <select
                  name="status"
                  class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
                  required
                >
                  <option value="Aktif">Aktif</option>
                  <option value="Nonaktif">Nonaktif</option>
                </select>
              </label>
            </div>
            <div
              class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200"
            >
              <a
                href="users.html"
                class="rounded-2xl border border-slate-300 px-5 py-3 text-slate-700 hover:bg-slate-100 transition inline-block"
                >Batal</a
              >
              <button
                type="submit"
                class="rounded-2xl bg-brand-600 px-5 py-3 text-white hover:bg-brand-700 transition"
              >
                Simpan User
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <div
      id="toast-container"
      class="fixed right-6 bottom-6 space-y-3 z-50"
    ></div>

    <script>
      const STORAGE_USERS = "perpus_siswa";

      const defaultUsers = [
        {
          id: 1,
          nama: "Roni",
          kelas: "XI IPA 1",
          nis: "2026001",
          status: "Aktif",
        },
        {
          id: 2,
          nama: "Sinta",
          kelas: "XI IPS 2",
          nis: "2026002",
          status: "Aktif",
        },
        {
          id: 3,
          nama: "Dewi Anggraini",
          kelas: "X IPA 3",
          nis: "2026003",
          status: "Aktif",
        },
        {
          id: 4,
          nama: "Bima Pratama",
          kelas: "XII IPS 1",
          nis: "2026004",
          status: "Aktif",
        },
      ];

      function showToast(message, type = "success") {
        const toast = document.createElement("div");
        toast.className = `rounded-3xl px-5 py-4 shadow-xl shadow-slate-900/10 flex items-center gap-3 text-sm ${type === "success" ? "bg-emerald-50 text-emerald-800 border border-emerald-100" : "bg-rose-50 text-rose-800 border border-rose-100"}`;
        toast.innerHTML = `<span class="material-icons-outlined">${type === "success" ? "check_circle" : "error"}</span><span>${message}</span>`;
        document.getElementById("toast-container").appendChild(toast);
        setTimeout(() => {
          toast.remove();
        }, 3200);
      }

      const form = document.getElementById("form-add-user");
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const formData = new FormData(event.target);
        const nama = formData.get("nama").trim();
        const kelas = formData.get("kelas").trim();
        const nis = formData.get("nis").trim();
        const status = formData.get("status");

        if (!nama || !kelas || !nis || !status) {
          showToast("Semua field user wajib diisi.", "error");
          return;
        }

        const usersData = localStorage.getItem(STORAGE_USERS);
        const users = usersData ? JSON.parse(usersData) : defaultUsers;

        if (users.some((user) => user.nis === nis)) {
          showToast("NIS sudah terdaftar.", "error");
          return;
        }

        const nextId = users.length
          ? Math.max(...users.map((user) => user.id)) + 1
          : 1;

        users.push({
          id: nextId,
          nama,
          kelas,
          nis,
          status,
        });

        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
        showToast("User baru berhasil ditambahkan.");

        setTimeout(() => {
          window.location.href = "users.html";
        }, 1500);
      });
    </script>
  </body>
</html>
