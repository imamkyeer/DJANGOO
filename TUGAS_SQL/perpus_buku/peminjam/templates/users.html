<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar User - Sistem Peminjaman Buku SIPUSTAKA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a",
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-900 h-screen overflow-hidden">
    <div class="h-screen flex flex-col md:flex-row">
      <aside
        class="w-full md:w-72 h-screen bg-slate-950 text-slate-100 flex-none flex flex-col"
      >
        <div class="px-6 py-7 border-b border-slate-800">
          <div class="flex items-center gap-3">
            <div
              class="w-11 h-11 rounded-2xl bg-gradient-to-br from-brand-500 to-sky-400 flex items-center justify-center shadow-lg shadow-slate-900/25"
            >
              <span class="text-xl font-bold">P</span>
            </div>
            <div>
              <p class="text-sm uppercase text-slate-400 tracking-[0.25em]">
                SIPUSTAKA
              </p>
              <h1 class="text-xl font-semibold">Sistem Peminjaman Buku</h1>
            </div>
          </div>
        </div>
        <nav class="flex-1 overflow-y-auto px-4 py-6 space-y-1">
          <a
            href="index.html"
            class="page-link w-full text-left rounded-2xl px-4 py-3 flex items-center gap-3 text-slate-300 hover:text-white hover:bg-slate-900 transition"
          >
            <span class="material-icons-outlined">dashboard</span>
            Dashboard
          </a>
          <a
            href="users.html"
            class="page-link w-full text-left rounded-2xl px-4 py-3 flex items-center gap-3 text-slate-200 bg-slate-900 shadow-inner shadow-black/10"
          >
            <span class="material-icons-outlined">group</span>
            User
          </a>
        </nav>
        <div class="mt-auto px-6 pb-6">
          <div
            class="rounded-3xl bg-slate-900 p-5 shadow-xl shadow-slate-900/20"
          >
            <p class="text-sm text-slate-400">Admin Aktif</p>
            <p class="mt-2 font-semibold text-white">Budi Siregar</p>
          </div>
        </div>
      </aside>
      <main class="flex-1 overflow-y-auto p-6 md:p-8">
        <div
          class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6"
        >
          <div>
            <p class="text-slate-500">Data siswa yang bisa meminjam buku.</p>
            <h3 class="text-2xl font-semibold text-slate-900">Daftar User</h3>
          </div>
          <a
            href="add_user.html"
            class="inline-flex items-center gap-2 rounded-2xl bg-brand-600 text-white px-5 py-3 shadow-lg shadow-brand-500/15 hover:bg-brand-700 transition"
          >
            <span class="material-icons-outlined">person_add</span>
            Tambah User
          </a>
        </div>
        <div
          class="rounded-3xl bg-white p-6 shadow-lg shadow-slate-200/60 border border-slate-200 overflow-x-auto"
        >
          <table class="min-w-full text-left text-sm">
            <thead class="border-b border-slate-200 text-slate-500">
              <tr>
                <th class="py-3 px-4">ID</th>
                <th class="py-3 px-4">Nama</th>
                <th class="py-3 px-4">Kelas</th>
                <th class="py-3 px-4">NIS</th>
                <th class="py-3 px-4">Status</th>
                <th class="py-3 px-4">Aksi</th>
              </tr>
            </thead>
            <tbody id="users-table" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script>
      const STORAGE_USERS = "perpus_siswa";

      const defaultUsers = [
        {
          id: 1,
          nama: "Roni",
          kelas: "XI IPA 1",
          nis: "2026001",
          status: "Aktif",
        },
        {
          id: 2,
          nama: "Sinta",
          kelas: "XI IPS 2",
          nis: "2026002",
          status: "Aktif",
        },
        {
          id: 3,
          nama: "Dewi Anggraini",
          kelas: "X IPA 3",
          nis: "2026003",
          status: "Aktif",
        },
        {
          id: 4,
          nama: "Bima Pratama",
          kelas: "XII IPS 1",
          nis: "2026004",
          status: "Aktif",
        },
      ];

      function createBadge(status) {
        const base =
          "inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold";
        if (status === "Aktif") {
          return `<span class="${base} bg-emerald-100 text-emerald-700">Aktif</span>`;
        }
        return `<span class="${base} bg-slate-200 text-slate-700">Nonaktif</span>`;
      }

      const usersData = localStorage.getItem(STORAGE_USERS);
      const users = usersData ? JSON.parse(usersData) : defaultUsers;

      if (!usersData) {
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
      }

      const usersTable = document.getElementById("users-table");
      usersTable.innerHTML =
        users
          .map(
            (user) => `
        <tr class="hover:bg-slate-50 transition">
          <td class="py-4 px-4 font-medium text-slate-800">${user.id}</td>
          <td class="py-4 px-4 text-slate-700">${user.nama}</td>
          <td class="py-4 px-4 text-slate-700">${user.kelas}</td>
          <td class="py-4 px-4 text-slate-700">${user.nis}</td>
          <td class="py-4 px-4">${createBadge(user.status)}</td>
          <td class="py-4 px-4 text-slate-500">-</td>
        </tr>`,
          )
          .join("") ||
        '<tr><td colspan="6" class="py-5 text-slate-500">Belum ada data user.</td></tr>';
    </script>
  </body>
</html>
