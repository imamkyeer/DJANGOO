<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Siswa</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<div class="container mx-auto p-6">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">CRUD Siswa</h1>

        <a href="/tambah/"
           class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg shadow">
            + Tambah
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-800 text-white">
                <tr>
                    <th class="p-4 text-left">Nama</th>
                    <th class="p-4 text-left">Umur</th>
                    <th class="p-4 text-left">Tanggal Lahir</th>
                    <th class="p-4 text-left">Nilai Akhir</th>
                    <th class="p-4 text-center">Aksi</th>
                </tr>
            </thead>

            <tbody>
                {% for siswa in data %}
                <tr class="border-b hover:bg-gray-100 transition">
                    <td class="p-4">{{ siswa.nama }}</td>
                    <td class="p-4">{{ siswa.umur }}</td>
                    <td class="p-4">{{ siswa.tgl_lahir }}</td>
                    <td class="p-4">{{ siswa.nilai_akhir }}</td>

                    <td class="p-4 text-center space-x-2">
                        <a href="/edit/{{ siswa.id }}/"
                           class="bg-yellow-400 hover:bg-yellow-500 text-white px-4 py-2 rounded-lg">
                            Edit
                        </a>

                        <a href="/hapus/{{ siswa.id }}/"
                           class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
                            Hapus
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
