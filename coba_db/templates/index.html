<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">

    <title>CRUD Siswa</title>

    <style>

        body{
            font-family: Arial;
            padding: 20px;
            background: #f4f4f4;
        }

        h1{
            text-align: center;
        }

        form{
            margin-bottom: 10px;
        }

        input{
            padding: 8px;
            margin: 5px;
        }

        button{
            padding: 8px 12px;
            cursor: pointer;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        table, th, td{
            border: 1px solid black;
        }

        th, td{
            padding: 10px;
            text-align: center;
        }

        .hapus{
            background: red;
            color: white;
            border: none;
        }

        .update{
            background: green;
            color: white;
            border: none;
        }

    </style>

</head>
<body>

    <h1>CRUD DATA SISWA</h1>

    <!-- FORM TAMBAH -->

    <form action="/tambah" method="POST">

        <input
            type="text"
            name="nama"
            placeholder="Nama"
            required
        >

        <input
            type="number"
            name="umur"
            placeholder="Umur"
            required
        >

        <input
            type="date"
            name="tgl_lahir"
            required
        >

        <input
            type="number"
            step="0.01"
            name="nilai_akhir"
            placeholder="Nilai Akhir"
            required
        >

        <button type="submit">
            Tambah
        </button>

    </form>

    <br>

    <!-- TABEL DATA -->

    <table>

        <tr>

            <th>ID</th>
            <th>Nama</th>
            <th>Umur</th>
            <th>Tanggal Lahir</th>
            <th>Nilai Akhir</th>
            <th>Aksi</th>

        </tr>

        {% for s in siswa %}

        <tr>

            <form action="/update/{{ s[0] }}"
                  method="POST">

                <td>{{ s[0] }}</td>

                <td>

                    <input
                        type="text"
                        name="nama"
                        value="{{ s[1] }}"
                    >

                </td>

                <td>

                    <input
                        type="number"
                        name="umur"
                        value="{{ s[2] }}"
                    >

                </td>

                <td>

                    <input
                        type="date"
                        name="tgl_lahir"
                        value="{{ s[3] }}"
                    >

                </td>

                <td>

                    <input
                        type="number"
                        step="0.01"
                        name="nilai_akhir"
                        value="{{ s[4] }}"
                    >

                </td>

                <td>

                    <button
                        class="update"
                        type="submit"
                    >
                        Update
                    </button>

                    <a href="/hapus/{{ s[0] }}">

                        <button
                            class="hapus"
                            type="button"
                        >
                            Hapus
                        </button>

                    </a>

                </td>

            </form>

        </tr>

        {% endfor %}

    </table>

</body>
</html>
