{% extends 'base.html' %}

{% block title %} Edit Siswa {% endblock %}

{% block content %}

<form method="POST" class="space-y-5">
    {% csrf_token %}

    <h1 class="text-3xl font-bold text-slate-900">
        Edit Siswa
    </h1>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
            Nama
        </label>

        <input
            type="text"
            name="nama"
            value="{{ siswa.nama }}"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm"
        />
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
            Umur
        </label>

        <input
            type="number"
            name="umur"
            value="{{ siswa.umur }}"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm"
        />
    </div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
            Tanggal Lahir
        </label>

        <input
            type="date"
            name="tgl_lahir"
            value="{{ siswa.tgl_lahir|date:'Y-m-d' }}"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm"
        />
    </div>
<div class="mb-4">
    <label class="block text-sm font-medium text-slate-700 mb-2">
        Status Hadir
    </label>

    <div class="flex items-center gap-6">
        
        <label class="flex items-center gap-2">
            <input type="radio" name="status" value="Hadir"
                   class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
            <span class="text-sm text-slate-700">Hadir</span>
        </label>

        <label class="flex items-center gap-2">
            <input type="radio" name="status" value="Tidak Hadir"
                   class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
            <span class="text-sm text-slate-700">Tidak Hadir</span>
        </label>

    </div>
</div>

    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
            Nilai Akhir
        </label>

        <input
            type="number"
            name="nilai_akhir"
            value="{{ siswa.nilai_akhir }}"
            class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm"
        />
    </div>

    <div class="flex gap-3">

        <button
            type="submit"
            class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600"
        >
            Update
        </button>

        <a
            href="{% url 'siswa_list' %}"
            class="px-4 py-2 bg-slate-200 rounded-lg"
        >
            Kembali
        </a>

    </div>

</form>

{% endblock %}
