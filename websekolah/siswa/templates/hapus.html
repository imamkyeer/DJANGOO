{% extends 'base.html' %}

{% block title %} Hapus Siswa {% endblock %}

{% block content %}

<h1 class="text-3xl font-bold text-red-600">
    Hapus Data
</h1>

<p class="mt-3 text-slate-600">
    Yakin ingin menghapus data siswa ini?
</p>

<div class="mt-5 p-4 rounded-lg border border-slate-200 bg-slate-50">
    <p><b>Nama:</b> {{ siswa.nama }}</p>
    <p><b>TANGGAL LAHIR:</b> {{ siswa.tgl_lahir }}</p>
</div>

<form method="POST" class="mt-5 flex gap-3">
    {% csrf_token %}

    <button
        type="submit"
        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700"
    >
        Ya, Hapus
    </button>

    <a
        href="{% url 'siswa_list' %}"
        class="px-4 py-2 bg-slate-200 rounded-lg"
    >
        Batal
    </a>
</form>

{% endblock %}
